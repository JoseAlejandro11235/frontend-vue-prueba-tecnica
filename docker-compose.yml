# Step 2 — requires backend running first (creates network legacy_shared)
#   cd ../backend-legacy-laravel8 && docker compose up -d --build
#   cd ../frontend-legacy-vue2 && docker compose up -d --build

services:
  frontend:
    build: .
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: /api
      VITE_PROXY_TARGET: http://api:8000
    networks:
      - legacy_shared

networks:
  legacy_shared:
    external: true
    name: legacy_shared
